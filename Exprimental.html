<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Made this for fun</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Experimental Stage</h1>
  <img src="That Guy Construction (By Angel Romero) .png" width="300">

  <div class="container1" id="box1" class="box">Box 1: I WANNA BE NEXT TO BOX 2!</div>
  <div class="container2" id="box2" class="box">Box 2</div>
  <div class="container3" id="box3" class="box">Box 3</div>
  <div class="container4" id="box4" class="box">Box 4: I wanna be alone...</div>
  </div>
  <header>
    <img src="ME AND TWIN.gif" width="550">
  </header>

  <audio controls>
    <source src="September - Earth, Wind & Fire.mp3" type="audio/ogg">
    <source src="September - Earth, Wind & Fire.mp3">
  </audio>








  <!-- Audio element -->
  <audio id="myAudio" src="September - Earth, Wind & Fire.mp3"></audio>

  <!-- Play and Pause buttons -->
  <p><b>September Earth, Wind & Fire</b></p>
  <img src="Earth, Wind & Fire Album Cover.png" width="300">
  <button onclick="playAudio()">Play</button>
  <button onclick="pauseAudio()">Pause</button>

  <script>
    // Get the audio element
    const audio = document.getElementById("myAudio");

    // Function to play audio
    function playAudio() {
      try {
        audio.play();
      } catch (err) {
        console.error("Error playing audio:", err);
      }
    }

    // Function to pause audio
    function pauseAudio() {
      try {
        audio.pause();
      } catch (err) {
        console.error("Error pausing audio:", err);
      }
    }
  </script>


  <button onclick="toggleAudio()">Play/Pause</button>

</body>
<script>

  function toggleAudio() {
    if (audio.paused) {
      audio.play();
    } else {
      audio.pause();
    }
  }
</script>
